---
- name: Discover Azure VM addresses and build in-memory inventory
  hosts: localhost
  gather_facts: false
  collections:
    - azure.azcollection
  vars:
    ssh_private_key_path: "{{ ansible_ssh_private_key_file | default(lookup('env', 'HOME') + '/.ssh/id_rsa') }}"
  tasks:
    - name: Validate node definitions exist
      ansible.builtin.assert:
        that:
          - k8s_nodes is defined
          - k8s_nodes | length == 3
        fail_msg: "k8s_nodes must contain master, worker1, and worker2 definitions."

    - name: Collect public IP details for each node
      azure.azcollection.azure_rm_publicipaddress_info:
        auth_source: cli
        subscription_id: "{{ lookup('env', 'AZURE_SUBSCRIPTION_ID') }}"
        resource_group: "{{ azure_rg }}"
        name: "{{ item.public_ip_name }}"
      loop: "{{ k8s_nodes }}"
      register: public_ip_lookup

    - name: Collect NIC details for each node
      azure.azcollection.azure_rm_networkinterface_info:
        auth_source: cli
        subscription_id: "{{ lookup('env', 'AZURE_SUBSCRIPTION_ID') }}"
        resource_group: "{{ azure_rg }}"
        name: "{{ item.nic_name }}"
      loop: "{{ k8s_nodes }}"
      register: nic_lookup

    - name: Build normalized node inventory structure
      ansible.builtin.set_fact:
        discovered_nodes: >-
          {{
            discovered_nodes | default([]) + [
              item.0 | combine({
                'public_ip': ((item.1.publicipaddresses | default([]) | first).ip_address),
                'private_ip': ((item.2.networkinterfaces | default([]) | first).ip_configurations | first).private_ip_address
              })
            ]
          }}
      loop: "{{ k8s_nodes | zip(public_ip_lookup.results, nic_lookup.results) | list }}"

    - name: Ensure every node has both public and private IPs
      ansible.builtin.assert:
        that:
          - item.public_ip is defined
          - item.public_ip | length > 0
          - item.private_ip is defined
          - item.private_ip | length > 0
        fail_msg: "Missing public or private IP for {{ item.name }}."
      loop: "{{ discovered_nodes }}"

    - name: Add hosts to dynamic inventory
      ansible.builtin.add_host:
        name: "{{ item.name }}"
        groups: "k8s,{{ (item.role == 'master') | ternary('control_plane','workers') }}"
        ansible_host: "{{ item.public_ip }}"
        ansible_user: "{{ vm_admin_username }}"
        ansible_ssh_private_key_file: "{{ ssh_private_key_path }}"
        ansible_python_interpreter: /usr/bin/python3
        private_ip: "{{ item.private_ip }}"
        vm_name: "{{ item.vm_name }}"
        node_role: "{{ item.role }}"
      loop: "{{ discovered_nodes }}"

    - name: Ensure local .ssh directory exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') + '/.ssh' }}"
        state: directory
        mode: '0700'

    - name: Ensure local known_hosts file exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') + '/.ssh/known_hosts' }}"
        state: touch
        mode: '0644'

    - name: Remove stale SSH host keys for cluster nodes
      ansible.builtin.command:
        cmd: "ssh-keygen -R {{ hostvars[item].ansible_host }}"
      loop: "{{ groups['k8s'] }}"
      changed_when: false
      failed_when: false

    - name: Add current SSH host keys for cluster nodes
      ansible.builtin.known_hosts:
        path: "{{ lookup('env', 'HOME') + '/.ssh/known_hosts' }}"
        name: "{{ hostvars[item].ansible_host }}"
        key: "{{ lookup('pipe', 'ssh-keyscan -H ' ~ hostvars[item].ansible_host ~ ' 2>/dev/null') }}"
      loop: "{{ groups['k8s'] }}"

    - name: Publish control plane private IP for later plays
      ansible.builtin.set_fact:
        control_plane_private_ip: >-
          {{ discovered_nodes | selectattr('role', 'equalto', 'master') | map(attribute='private_ip') | first }}

    - name: Add localhost with cluster metadata
      ansible.builtin.add_host:
        name: cluster_metadata
        groups: cluster_metadata
        control_plane_private_ip: "{{ control_plane_private_ip }}"

- name: Bootstrap all Kubernetes nodes
  hosts: k8s
  become: true
  gather_facts: true
  roles:
    - bootstrap

- name: Initialize control plane and install Calico
  hosts: control_plane
  become: true
  gather_facts: true
  roles:
    - control_plane

- name: Join worker nodes to the cluster
  hosts: workers
  become: true
  gather_facts: true
  roles:
    - workers
