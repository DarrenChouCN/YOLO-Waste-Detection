---
- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  when: ansible_swaptotal_mb | int > 0
  changed_when: ansible_swaptotal_mb | int > 0

- name: Disable swap in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s+sw\s+.*)$'
    replace: '# \1'

- name: Load required kernel modules now
  ansible.builtin.command:
    cmd: "modprobe {{ item }}"
  loop:
    - overlay
    - br_netfilter
  changed_when: false

- name: Persist required kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    mode: '0644'
    content: |
      overlay
      br_netfilter

- name: Configure Kubernetes sysctl settings
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-kubernetes-cri.conf
    mode: '0644'
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1

- name: Apply sysctl settings
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Install OS dependencies
  ansible.builtin.apt:
    name: "{{ k8s_common_packages }}"
    state: present
    update_cache: true

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Kubernetes repository key
  ansible.builtin.get_url:
    url: "{{ kubernetes_key_url }}"
    dest: /etc/apt/keyrings/kubernetes-apt-keyring.asc
    mode: '0644'

- name: Convert Kubernetes repository key to gpg format
  ansible.builtin.command:
    cmd: >-
      gpg --dearmor
      --yes
      --output /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      /etc/apt/keyrings/kubernetes-apt-keyring.asc
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg

- name: Configure Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] {{ kubernetes_apt_repo }} /"
    filename: kubernetes
    state: present

- name: Install kubelet kubeadm and kubectl
  ansible.builtin.apt:
    name: "{{ kube_packages }}"
    state: present
    update_cache: true

- name: Hold Kubernetes packages
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ kube_packages }}"

- name: Ensure containerd config directory exists
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: '0755'

- name: Create default containerd config if missing
  ansible.builtin.command: >-
    containerd config default
  register: containerd_default_config
  changed_when: false

- name: Write containerd config
  ansible.builtin.copy:
    dest: "{{ containerd_config_path }}"
    mode: '0644'
    content: "{{ containerd_default_config.stdout }}"

- name: Enable SystemdCgroup in containerd config
  ansible.builtin.replace:
    path: "{{ containerd_config_path }}"
    regexp: '^\s*SystemdCgroup = false'
    replace: '            SystemdCgroup = true'

- name: Restart and enable containerd
  ansible.builtin.systemd:
    name: containerd
    state: restarted
    enabled: true
    daemon_reload: true

- name: Ensure kubelet service is enabled
  ansible.builtin.systemd:
    name: kubelet
    enabled: true
    state: started
