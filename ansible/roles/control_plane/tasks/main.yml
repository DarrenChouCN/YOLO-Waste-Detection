---
- name: Check whether control plane already exists
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: admin_conf

- name: Initialize Kubernetes control plane
  ansible.builtin.command: >-
    kubeadm init
    --apiserver-advertise-address={{ private_ip }}
    --pod-network-cidr={{ pod_network_cidr }}
    --node-name={{ inventory_hostname }}
  register: kubeadm_init_result
  when: not admin_conf.stat.exists
  changed_when: true

- name: Ensure .kube directory exists for remote admin user
  ansible.builtin.file:
    path: /home/{{ ansible_user }}/.kube
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0700'

- name: Copy admin kubeconfig to remote admin user
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/{{ ansible_user }}/.kube/config
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
    remote_src: true

- name: Check whether Calico is already installed
  ansible.builtin.command: kubectl get daemonset calico-node -n kube-system
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: calico_status
  failed_when: false
  changed_when: false

- name: Install Calico network plugin
  ansible.builtin.command: kubectl apply -f {{ calico_manifest_url }}
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  when: calico_status.rc != 0
  changed_when: true

- name: Generate worker join command
  ansible.builtin.command: kubeadm token create --print-join-command
  register: join_command_raw
  changed_when: false

- name: Publish worker join command for other hosts
  ansible.builtin.set_fact:
    worker_join_command: "{{ join_command_raw.stdout }}"

- name: Wait for Kubernetes API to answer locally
  ansible.builtin.command: kubectl get nodes
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: kubectl_nodes
  retries: 20
  delay: 15
  until: kubectl_nodes.rc == 0
  changed_when: false
